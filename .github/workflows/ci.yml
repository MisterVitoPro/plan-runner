name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Contract tests
        run: node --test tests/contract.test.js
      - name: Validate manifests and synchronized versions
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const claude = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
          const codex = JSON.parse(fs.readFileSync('.codex-plugin/plugin.json', 'utf8'));
          if (claude.name !== 'plan-runner' || codex.name !== claude.name || codex.version !== claude.version) {
            throw new Error('Claude and Codex manifest names/versions must match');
          }
          NODE
      - name: Validate Codex skill frontmatter
        run: |
          python3 - <<'PY'
          from pathlib import Path

          allowed = {'name', 'description', 'allowed-tools', 'license', 'metadata'}
          for skill in Path('skills').glob('*/SKILL.md'):
              text = skill.read_text()
              assert text.startswith('---\n'), f'{skill}: missing frontmatter'
              frontmatter = text.split('---\n', 2)[1]
              keys = {
                  line.split(':', 1)[0]
                  for line in frontmatter.splitlines()
                  if line and not line[0].isspace() and ':' in line
              }
              assert keys <= allowed, f'{skill}: unsupported keys {keys - allowed}'
              assert f'name: {skill.parent.name}' in frontmatter, f'{skill}: name must match folder'
          PY

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate plugin manifest
        run: claude plugin validate .

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate schemas against fixtures
        run: python tests/validate_schemas.py
